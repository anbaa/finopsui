version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd ui
        - npm ci
    build:
      commands:
        - echo "{\"version\":\"${AWS_COMMIT_ID}\"}" > public/version.json
        - npm run build
  artifacts:
    baseDirectory: ui/.next
    files:
      - '**/*'
  cache:
    paths:
      - ui/node_modules/**/*
      - ui/.next/cache/**/*
